<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" font-family="Arial, Helvetica, sans-serif">
  <style>
    .pattern { fill: rgba(142, 68, 173, 0.2); stroke: #8e44ad; stroke-width: 2; }
    .backlobe { fill: rgba(231, 76, 60, 0.15); stroke: #e74c3c; stroke-width: 1.5; stroke-dasharray: 4,3; }
    .axis { stroke: #999; stroke-width: 1; stroke-dasharray: 4,3; }
    .element { stroke: #333; stroke-width: 3; stroke-linecap: round; }
    .driven { stroke: #2980b9; stroke-width: 3.5; stroke-linecap: round; }
    .boom { stroke: #666; stroke-width: 2; }
    .feedpoint { fill: #2980b9; }
    .label { font-size: 13px; fill: #333; text-anchor: middle; }
    .title { font-size: 18px; fill: #111; text-anchor: middle; font-weight: bold; }
    .subtitle { font-size: 12px; fill: #666; text-anchor: middle; }
    .arrow-label { font-size: 11px; fill: #8e44ad; text-anchor: middle; font-weight: bold; }
    .back-label { font-size: 11px; fill: #e74c3c; text-anchor: middle; }
    .elem-label { font-size: 11px; fill: #555; }
    .note { font-size: 11px; fill: #555; text-anchor: middle; }
    .callout { font-size: 12px; fill: #333; }
  </style>

  <!-- Title -->
  <text x="300" y="28" class="title">Yagi-Uda — Radiation Pattern</text>
  <text x="300" y="46" class="subtitle">3-element Yagi azimuthal pattern (top view)</text>

  <!-- Center point at 260, 230 -->

  <!-- Horizontal axis -->
  <line x1="50" y1="230" x2="550" y2="230" class="axis"/>
  <!-- Vertical axis -->
  <line x1="260" y1="60" x2="260" y2="400" class="axis"/>

  <!-- Main lobe (large, pointing right = forward direction) -->
  <path d="M 260,230
           C 260,160 420,100 500,230
           C 420,360 260,300 260,230 Z" class="pattern"/>

  <!-- Back lobe (small, pointing left) -->
  <ellipse cx="220" cy="230" rx="35" ry="28" class="backlobe"/>

  <!-- Minor side lobes (very small) -->
  <ellipse cx="295" cy="155" rx="15" ry="10" class="backlobe" transform="rotate(-30, 295, 155)"/>
  <ellipse cx="295" cy="305" rx="15" ry="10" class="backlobe" transform="rotate(30, 295, 305)"/>

  <!-- Boom (horizontal line through elements) -->
  <line x1="170" y1="230" x2="340" y2="230" class="boom"/>

  <!-- Reflector (longest, leftmost) -->
  <line x1="185" y1="185" x2="185" y2="275" class="element"/>
  <text x="185" y="178" class="elem-label" text-anchor="middle">Reflector</text>
  <text x="185" y="290" class="elem-label" text-anchor="middle">(longest)</text>

  <!-- Driven element (middle) -->
  <line x1="250" y1="192" x2="250" y2="268" class="driven"/>
  <circle cx="250" cy="230" r="4" class="feedpoint"/>
  <text x="250" y="185" class="elem-label" text-anchor="middle" fill="#2980b9">Driven</text>
  <text x="250" y="282" class="elem-label" text-anchor="middle" fill="#2980b9">(feed here)</text>

  <!-- Director (shortest, rightmost) -->
  <line x1="325" y1="198" x2="325" y2="262" class="element"/>
  <text x="325" y="192" class="elem-label" text-anchor="middle">Director</text>
  <text x="325" y="276" class="elem-label" text-anchor="middle">(shortest)</text>

  <!-- Direction arrow (forward) -->
  <line x1="460" y1="230" x2="530" y2="230" stroke="#8e44ad" stroke-width="2"/>
  <polygon points="535,230 520,222 520,238" fill="#8e44ad"/>
  <text x="500" y="215" class="arrow-label">Main Lobe</text>
  <text x="500" y="255" class="arrow-label">→ Forward</text>

  <!-- Back lobe label -->
  <text x="160" y="218" class="back-label">Back</text>
  <text x="160" y="232" class="back-label">lobe</text>

  <!-- Side lobe labels -->
  <text x="330" y="148" class="back-label" font-size="9">Side lobe</text>
  <text x="330" y="322" class="back-label" font-size="9">Side lobe</text>

  <!-- Front-to-back ratio callout -->
  <rect x="30" y="350" width="240" height="115" rx="6" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
  <text x="150" y="370" class="callout" text-anchor="middle" font-weight="bold">Key Yagi Facts</text>
  <text x="45" y="390" class="note" text-anchor="start">• Reflector = longest element (behind)</text>
  <text x="45" y="407" class="note" text-anchor="start">• Director = shortest element (in front)</text>
  <text x="45" y="424" class="note" text-anchor="start">• More directors = more gain</text>
  <text x="45" y="441" class="note" text-anchor="start">• Front-to-back: 15–25 dB typical</text>
  <text x="45" y="458" class="note" text-anchor="start">• Stacking two = +3 dB gain</text>

  <!-- Gain comparison -->
  <rect x="330" y="350" width="240" height="115" rx="6" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
  <text x="450" y="370" class="callout" text-anchor="middle" font-weight="bold">Gain Comparison</text>
  <text x="345" y="390" class="note" text-anchor="start">Dipole:    0 dBd  (2.15 dBi)</text>
  <text x="345" y="407" class="note" text-anchor="start">3-el Yagi: ~8 dBd (10.15 dBi)</text>
  <text x="345" y="424" class="note" text-anchor="start">5-el Yagi: ~10 dBd (12.15 dBi)</text>
  <text x="345" y="441" class="note" text-anchor="start">Long boom: ~13 dBd (15.15 dBi)</text>
  <text x="345" y="458" class="note" text-anchor="start">dBi = dBd + 2.15</text>
</svg>