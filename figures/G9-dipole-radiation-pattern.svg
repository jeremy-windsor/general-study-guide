<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" font-family="Arial, Helvetica, sans-serif">
  <style>
    .pattern { fill: rgba(41, 128, 185, 0.25); stroke: #2980b9; stroke-width: 2; }
    .axis { stroke: #999; stroke-width: 1; stroke-dasharray: 4,3; }
    .antenna { stroke: #c0392b; stroke-width: 4; stroke-linecap: round; }
    .feedpoint { fill: #c0392b; }
    .label { font-size: 13px; fill: #333; text-anchor: middle; }
    .title { font-size: 18px; fill: #111; text-anchor: middle; font-weight: bold; }
    .subtitle { font-size: 12px; fill: #666; text-anchor: middle; }
    .arrow-label { font-size: 11px; fill: #2980b9; text-anchor: middle; font-weight: bold; }
    .null-label { font-size: 11px; fill: #c0392b; text-anchor: middle; }
    .dim-arrow { stroke: #666; stroke-width: 1; fill: #666; }
    .note { font-size: 11px; fill: #555; text-anchor: middle; }
  </style>

  <!-- Title -->
  <text x="250" y="30" class="title">Half-Wave Dipole — Radiation Pattern</text>
  <text x="250" y="48" class="subtitle">Azimuthal plane (looking down at the antenna)</text>

  <!-- Center point -->
  <!-- Axes -->
  <line x1="250" y1="90" x2="250" y2="430" class="axis"/>
  <line x1="70" y1="260" x2="430" y2="260" class="axis"/>

  <!-- Figure-8 pattern using two ellipses -->
  <!-- Top lobe (broadside, perpendicular to wire) -->
  <ellipse cx="250" cy="175" rx="85" ry="80" class="pattern"/>
  <!-- Bottom lobe -->
  <ellipse cx="250" cy="345" rx="85" ry="80" class="pattern"/>

  <!-- Antenna wire (horizontal through center) -->
  <line x1="170" y1="260" x2="240" y2="260" class="antenna"/>
  <line x1="260" y1="260" x2="330" y2="260" class="antenna"/>
  <!-- Feed point dot -->
  <circle cx="250" cy="260" r="5" class="feedpoint"/>

  <!-- Direction arrows for max radiation -->
  <line x1="250" y1="90" x2="250" y2="100" class="axis" stroke-dasharray="none" stroke="#2980b9" stroke-width="1.5"/>
  <polygon points="250,88 245,98 255,98" fill="#2980b9"/>
  <text x="250" y="82" class="arrow-label">Maximum</text>

  <line x1="250" y1="430" x2="250" y2="420" class="axis" stroke-dasharray="none" stroke="#2980b9" stroke-width="1.5"/>
  <polygon points="250,432 245,422 255,422" fill="#2980b9"/>
  <text x="250" y="448" class="arrow-label">Maximum</text>

  <!-- Null indicators at wire ends -->
  <text x="110" y="256" class="null-label">Null ✕</text>
  <text x="390" y="256" class="null-label">Null ✕</text>

  <!-- Wire labels -->
  <text x="190" y="250" class="label" font-size="11">← Wire</text>
  <text x="310" y="250" class="label" font-size="11">Wire →</text>

  <!-- Annotations -->
  <text x="250" y="475" class="note">Pattern is at right angles to the wire</text>
  <text x="250" y="490" class="note">Nulls off the ends • Maximum broadside</text>
</svg>